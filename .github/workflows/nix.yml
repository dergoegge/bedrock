name: Nix

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build kernel module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#bedrockModule
      - run: nix build .#check-stack

  clippy:
    name: Clippy (kernel module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#clippy-kernel

  integration-test:
    name: Integration tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: nix run .#test
