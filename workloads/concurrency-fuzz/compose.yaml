# Concurrency-fuzz workload: one container running the producer/consumer sample
# until it crashes, then shutting the VM down. The in-kernel sched_ext fuzzing
# scheduler is loaded by the guest at boot (scx-init); crun-shim — podman's OCI
# runtime — switches this container's processes into SCHED_EXT, so they are
# fuzzed automatically. Under bedrock's single vCPU + deterministic emulated TSC
# the whole run replays from the getrandom stream that drives the schedule.
#
# The image comes from images.tar (built by ./build.sh); never pulled.

services:
  fuzz:
    image: bedrock/concurrency-fuzz:latest
    pull_policy: never
    container_name: fuzz
    privileged: true  # Required for the VMCALL ready/shutdown helper.
    # No `pid: host` needed: crun-shim (podman's OCI runtime) switches this
    # container's processes into SCHED_EXT by pid, so the fuzzing scheduler
    # governs them regardless of PID namespace — the container keeps its private one.
    command: ["/usr/local/bin/run.sh"]
