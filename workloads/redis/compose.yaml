# A 3-node Redis cluster (1 primary + 2 read-only replicas) and a stress
# container that exercises the cluster with a deterministic batch of
# operations and a set of more complex driver scripts under
# /opt/bedrock/drivers/.
#
# Each container runs in its own network namespace and joins podman's
# default bridge network. aardvark-dns resolves container_name as a
# hostname, so replicas attach to the primary via `--replicaof redis 6379`
# and the stress client reaches each server by service name. Determinism
# of IP/MAC assignment is provided by the bedrock hypervisor (virtualized
# TSC, RDRAND, interrupts), not by pinning here.
#
# All images come from images.tar (built by ./build.sh) — never pulled.
# `image:` refs use bare names (no `docker.io/` registry prefix) so podman's
# fallback resolution finds the `localhost/...` tags it adds at load time.

services:
  redis:
    image: redis:7-alpine
    pull_policy: never
    container_name: redis
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --port
      - "6379"
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - debug

  redis-replica-1:
    image: redis:7-alpine
    pull_policy: never
    container_name: redis-replica-1
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --port
      - "6380"
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - debug
      - --replicaof
      - redis
      - "6379"
    depends_on:
      - redis

  redis-replica-2:
    image: redis:7-alpine
    pull_policy: never
    container_name: redis-replica-2
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --port
      - "6381"
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - debug
      - --replicaof
      - redis
      - "6379"
    depends_on:
      - redis

  stress:
    image: bedrock/redis-stress:latest
    pull_policy: never
    container_name: stress
    privileged: true  # Required for VMCALL
    command: ["30"]  # Sleep interval in seconds between stress batches
    depends_on:
      - redis
      - redis-replica-1
      - redis-replica-2
